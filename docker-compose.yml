version: "3.8"

services:
  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   
      - "9001:9001"  

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      sh -c "
        sleep 5 &&
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/rayok &&
        mc anonymous set public local/rayok
      "
    restart: on-failure

  backend:
    build: ./backend
    restart: always
    env_file:
      - .env
    depends_on:
      - mongo
      - minio
    ports:
      - "8080:8080"   

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"  

volumes:
  mongo_data:
  minio_data:
