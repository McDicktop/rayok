version: "3.8"

services:
  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    restart: always
    env_file:
      - .env
    depends_on:
      - mongo
      - minio

  frontend:
    build: ./frontend
    restart: always

volumes:
  mongo_data:
  minio_data: